<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MAGI System</title>
<style>
html {
  background: repeating-linear-gradient(45deg, rgb(0 0 0) 0px, rgb(0 0 0) 20px, #140b02 20px, #140b02 40px);
  min-height: 100vh;
}

body {
  margin: 15px;
}

.system {
  background: black;
  border: 2px solid #ff8d00;
  padding: 15px;
  max-width: 1200px;
  display: flex;
  flex-direction: column;
  position: relative;
  margin: 0 auto;
}

.magi {
  display: grid;
  grid-template-columns:
    [left-header-start]
    20px
    [casper-start status]
    2fr
    [left-header-end balthasar-start casper-balthasar-connection]
    0.5fr
    [casper-end title casper-melchior-connection]
    1fr
    [balthasar-melchior-connection melchior-start]
    0.5fr
    [right-header-start balthasar-end response]
    2fr
    [melchior-end]
    20px
    [right-header-end];
  grid-template-rows:
    20px
    [header balthasar-start]
    2fr
    [status response]
    2fr
    [casper-start melchior-start casper-balthasar-connection balthasar-melchior-connection]
    1fr
    [balthasar-end title casper-melchior-connection]
    3fr
    [casper-end melchior-end]
    20px;
  aspect-ratio: 2 / 1;
  container-type: size;
  border: 2px solid #ff8d00;
}

.magi > .title {
  grid-area: title / title;
  color: #ff8d00;
  text-align: center;
  font-size: 9cqh;
  font-weight: bold;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  user-select: none;
}

.magi > .header {
  overflow: hidden;
}

.magi > .header > hr {
  border: 2px solid #277547;
  height: 4px;
  margin: 2px;
}

.magi > .header > span {
  color: #ff8d00;
  font-size: 10cqh;
  display: flex;
  justify-content: center;
  font-weight: bold;
  transform: scaleX(2);
}

.magi > .header.left {
  grid-area: header / left-header-start / auto / left-header-end;
}

.magi > .header.right {
  grid-area: header / right-header-start / auto / right-header-end;
}

.magi > .system-status {
  grid-area: status;
  font-family: 'Lucida Console', 'Courier New', monospace;
  color: #ff8d00;
}

.magi > .system-status > div {
  font-size: 3cqh;
  margin-left: 4cqw;
  transform: scaleX(1.2);
  transform-origin: left;
}

.magi > .system-status > div:first-child {
  font-size: 6cqh;
  margin-left: 0;
}

.magi > .response {
  grid-area: response;
  justify-self: flex-end;
  align-self: center;
  border: solid 2px;
  padding: 2px;
  display: none;
}

.magi > .response.visible {
  display: block;
}

.magi > .response > .inner {
  white-space: nowrap;
  border: solid 2px;
  padding: 2px 10px;
  font-size: 8cqh;
  font-weight: bold;
}

.magi > .wise-man {
  display: flex;
  background: #ff8d00;
  padding: 2px;
  cursor: pointer;
}

.magi > .wise-man > .inner {
  width: 100%;
  height: 100%;
  font-family: Helvetica, Arial, sans-serif;
  font-size: 8cqh;
  font-weight: bold;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 5%;
  line-height: 1.15;
}

.magi > .wise-man.melchior {
  grid-area: melchior-start / melchior-start / melchior-end / melchior-end;
}

.magi > .wise-man.melchior,
.magi > .wise-man.melchior > .inner {
  clip-path: polygon(35% 0, 100% 0, 100% 100%, 0 100%, 0 44%);
}

.magi > .wise-man.balthasar {
  grid-area: balthasar-start / balthasar-start / balthasar-end / balthasar-end;
}

.magi > .wise-man.balthasar,
.magi > .wise-man.balthasar > .inner {
  clip-path: polygon(0 0, 100% 0, 100% 80%, 75% 100%, 25% 100%, 0 80%);
}

.magi > .wise-man.casper {
  grid-area: casper-start / casper-start / casper-end / casper-end;
}

.magi > .wise-man.casper,
.magi > .wise-man.casper > .inner {
  clip-path: polygon(0 0, 65% 0, 100% 44%, 100% 100%, 0 100%);
}

/* ── Voted state ── */
.magi > .wise-man.voted > .inner {
  font-size: 4cqh;
  line-height: 1.4;
  font-family: 'Lucida Console', 'Courier New', monospace;
  word-break: break-all;
}

.magi > .wise-man.voted.resolve             { background: #1a521a; }
.magi > .wise-man.voted.resolve > .inner    { color: #aaff99; }

.magi > .wise-man.voted.reject              { background: #5a1010; }
.magi > .wise-man.voted.reject > .inner     { color: #ffaaaa; }

/* ── Response badge colors ── */
.magi > .response.resolve { color: #8eff9f; }
.magi > .response.reject  { color: #d94a4a; }

@keyframes flicker-animation {
  0%   {}
  50%  { background: black; color: black; border-color: black; }
}

.flicker {
  animation: flicker-animation 0.25s infinite step-end;
}

.connection {
  height: 10px;
  background: #ff8d00;
  align-self: center;
  margin: -10%;
}

.connection.casper-balthasar {
  grid-area: casper-balthasar-connection;
  transform: rotate(-54deg);
}

.connection.casper-melchior {
  grid-area: casper-melchior-connection;
}

.connection.balthasar-melchior {
  grid-area: balthasar-melchior-connection;
  transform: rotate(54deg);
}

/* ── Modal ── */
.modal {
  border: 2px solid #ff8d00;
  color: #ff8d00;
  font-family: 'Lucida Console', 'Courier New', monospace;
  position: absolute;
  background: black;
  max-width: 60%;
  top: 10%;
  right: 10%;
  z-index: 100;
}

.modal > .modal-header {
  display: flex;
  flex-direction: row;
  border-bottom: 2px solid #ff8d00;
}

.modal > .modal-header > .modal-title {
  flex: 1;
  padding: 5px;
  background: repeating-linear-gradient(45deg, rgb(0 0 0) 0px, rgb(0 0 0) 10px, #211200 10px, #211200 20px);
  font-size: 13px;
  font-weight: bold;
  letter-spacing: 1px;
}

.modal > .modal-header > .close {
  padding: 5px 9px;
  border-left: 2px solid #ff8d00;
  cursor: pointer;
  font-size: 16px;
  font-weight: bold;
}

.modal > .modal-header > .close:hover {
  background: #ff8d00;
  color: black;
}

.modal > .modal-body {
  display: grid;
  grid-template-columns: auto auto;
  column-gap: 10px;
  padding: 10px;
  align-items: center;
}

.input-container {
  display: grid;
  grid-template-columns: auto 1fr;
  color: #ff8d00;
  font-family: 'Lucida Console', 'Courier New', monospace;
  column-gap: 10px;
  row-gap: 5px;
  margin-top: 5px;
  font-size: 12px;
  font-weight: bold;
  letter-spacing: 1px;
  align-items: center;
}

.input-container > input {
  background: #1f1203;
  border: 2px solid #ff8d00;
  color: #ff8d00;
  font-family: 'Lucida Console', 'Courier New', monospace;
  font-size: 13px;
  padding: 3px 6px;
  outline: none;
}

.input-container > input::placeholder {
  color: rgba(255, 141, 0, 0.4);
}

.activate-btn {
  grid-column: 1 / 3;
  margin-top: 10px;
  background: transparent;
  border: 2px solid #ff8d00;
  color: #ff8d00;
  font-family: 'Lucida Console', 'Courier New', monospace;
  font-size: 14px;
  font-weight: bold;
  letter-spacing: 3px;
  padding: 6px 20px;
  cursor: pointer;
  width: 100%;
  transition: background 0.15s, color 0.15s;
}

.activate-btn:hover {
  background: #ff8d00;
  color: black;
}

.activate-btn:disabled {
  opacity: 0.35;
  cursor: not-allowed;
}
</style>
</head>
<body>

<div class="system">
  <div class="magi" id="magi">

    <!-- 左上ヘッダー -->
    <div class="header left">
      <hr><span>提訴</span><hr>
    </div>

    <!-- 右上ヘッダー -->
    <div class="header right">
      <hr><span>決議</span><hr>
    </div>

    <!-- システム情報 -->
    <div class="system-status">
      <div>CODE:<span id="code-num">473</span></div>
      <div>FILE:MAGI_SYS</div>
      <div>EXTENTION:3023</div>
      <div>EX_MODE:OFF</div>
      <div>PRIORITY:AAA</div>
    </div>

    <!-- 裁決バッジ（右上） -->
    <div class="response" id="response">
      <div class="inner" id="response-inner"></div>
    </div>

    <!-- 中央タイトル（クリックで入力を開く） -->
    <div class="title" id="magi-title" title="Click to deliberate">MAGI</div>

    <!-- 三面板 -->
    <div class="wise-man balthasar" id="balthasar">
      <div class="inner" id="balthasar-inner">BALTHASAR・2</div>
    </div>

    <div class="wise-man casper" id="casper">
      <div class="inner" id="casper-inner">CASPER・3</div>
    </div>

    <div class="wise-man melchior" id="melchior">
      <div class="inner" id="melchior-inner">MELCHIOR・1</div>
    </div>

    <!-- 接続ライン -->
    <div class="connection casper-balthasar"></div>
    <div class="connection casper-melchior"></div>
    <div class="connection balthasar-melchior"></div>
  </div>

  <!-- 入力モーダル -->
  <div class="modal" id="modal" style="display:none;">
    <div class="modal-header">
      <div class="modal-title">■ MAGI DELIBERATION SYSTEM — QUERY INPUT</div>
      <div class="close" id="closeBtn">×</div>
    </div>
    <div class="modal-body">
      <div style="grid-column:1/3;">
        <div class="input-container">
          <span>QUERY&nbsp;&nbsp;:</span>
          <input type="text" id="queryInput" placeholder="输入审议问题…" autocomplete="off" />
          <span>ACCESS :</span>
          <input type="text" value=".............................." readonly tabindex="-1" />
        </div>
      </div>
      <button class="activate-btn" id="confirmBtn" type="button">ACTIVATE MAGI</button>
    </div>
  </div>
</div>

<script>
(function () {
  'use strict';

  const magiEl    = document.getElementById('magi');
  const modal     = document.getElementById('modal');
  const closeBtn  = document.getElementById('closeBtn');
  const queryInput= document.getElementById('queryInput');
  const confirmBtn= document.getElementById('confirmBtn');
  const responseEl= document.getElementById('response');
  const responseIn= document.getElementById('response-inner');
  const codeEl    = document.getElementById('code-num');

  const panels = {
    balthasar: {
      el:    document.getElementById('balthasar'),
      inner: document.getElementById('balthasar-inner'),
      def:   'BALTHASAR・2',
    },
    casper: {
      el:    document.getElementById('casper'),
      inner: document.getElementById('casper-inner'),
      def:   'CASPER・3',
    },
    melchior: {
      el:    document.getElementById('melchior'),
      inner: document.getElementById('melchior-inner'),
      def:   'MELCHIOR・1',
    },
  };

  let voting = false, voted = false;

  /* ── ランダムコード ── */
  const randCode = () => {
    codeEl.textContent = String(100 + Math.floor(Math.random() * 900));
  };

  /* ── リセット ── */
  const doReset = () => {
    voting = voted = false;
    confirmBtn.disabled = false;
    confirmBtn.textContent = 'ACTIVATE MAGI';

    Object.values(panels).forEach(p => {
      p.el.classList.remove('flicker', 'voted', 'resolve', 'reject');
      p.inner.textContent = p.def;
    });

    responseEl.classList.remove('visible', 'resolve', 'reject');
    responseIn.textContent = '';
  };

  /* ── モーダルを開く ── */
  const openModal = () => {
    if (voted) { doReset(); return; }
    if (voting) return;
    modal.style.display = 'block';
    queryInput.value = '';
    queryInput.focus();
  };

  /* ── モーダルを閉じる ── */
  const closeModal = () => {
    modal.style.display = 'none';
  };

  /* ── テキスト抽出（最大 N 文字） ── */
  const excerpt = (text, max) => {
    if (!text) return '';
    const lines = (text + '').split('\n')
      .map(l => l.trim())
      .filter(l => l && !/^[【={▸]/.test(l));
    return lines.join(' ').slice(0, max || 80);
  };

  /* ── 裁決パース ── */
  const parseVerdict = data => {
    const v = data.verdict || data.casper || '';
    if (/否决|否定|搁置/.test(v)) return 'reject';
    return 'resolve';
  };

  /* ── 審議開始 ── */
  const startDeliberation = async () => {
    const q = queryInput.value.trim();
    if (!q) {
      queryInput.style.borderColor = '#d94a4a';
      queryInput.focus();
      setTimeout(() => { queryInput.style.borderColor = '#ff8d00'; }, 600);
      return;
    }

    closeModal();
    voting = true;
    confirmBtn.disabled = true;
    randCode();

    /* フリッカー開始 */
    Object.values(panels).forEach(p => p.el.classList.add('flicker'));

    try {
      const res = await fetch('/api/analyze', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question: q }),
      });

      if (!res.ok) {
        const e = await res.json().catch(() => ({}));
        throw new Error(e.detail || 'HTTP ' + res.status);
      }

      const data = await res.json();
      const verdict = parseVerdict(data);

      /* フリッカー停止・面板を色付け */
      Object.values(panels).forEach(p => p.el.classList.remove('flicker'));

      /* 各面板に結果テキストを表示 */
      const keys = { balthasar: data.balthasar, casper: data.casper, melchior: data.melchior };
      Object.entries(keys).forEach(([name, text]) => {
        const p = panels[name];
        p.inner.textContent = excerpt(text, 80);
        p.el.classList.add('voted');
      });

      /* 個別裁決（全体/二比一/否决） */
      if (/二比一/.test(data.verdict || '')) {
        panels.balthasar.el.classList.add('resolve');
        panels.casper.el.classList.add('reject');
        panels.melchior.el.classList.add('resolve');
      } else if (verdict === 'reject') {
        Object.values(panels).forEach(p => p.el.classList.add('reject'));
      } else {
        Object.values(panels).forEach(p => p.el.classList.add('resolve'));
      }

      /* 裁決バッジ */
      const label = verdict === 'resolve' ? '承認' : '否定';
      responseIn.textContent = label;
      responseEl.classList.add('visible', verdict);

      voting = false;
      voted  = true;
      confirmBtn.disabled = false;

    } catch (err) {
      console.error('MAGI error:', err);
      Object.values(panels).forEach(p => p.el.classList.remove('flicker'));
      voting = false;
      confirmBtn.disabled = false;
      /* エラー表示 */
      responseIn.textContent = 'ERROR';
      responseEl.classList.add('visible', 'reject');
      setTimeout(doReset, 3000);
    }
  };

  /* ── イベント ── */
  document.getElementById('magi-title').addEventListener('click', openModal);

  /* 面板クリック：投票後はリセット、それ以外は入力を開く */
  Object.values(panels).forEach(p => {
    p.el.addEventListener('click', () => {
      if (voted) doReset();
      else openModal();
    });
  });

  closeBtn.addEventListener('click', closeModal);
  confirmBtn.addEventListener('click', startDeliberation);

  queryInput.addEventListener('keydown', e => {
    if (e.key === 'Enter')  startDeliberation();
    if (e.key === 'Escape') closeModal();
  });

  /* ESC でモーダルを閉じる */
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape' && modal.style.display !== 'none') closeModal();
  });
})();
</script>
</body>
</html>
