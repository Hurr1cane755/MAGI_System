<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MAGI System</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@700;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  font-family: 'Noto Serif JP', 'Noto Serif TC', 'Source Han Serif TC', serif;
}

html {
  background: repeating-linear-gradient(
    45deg,
    #000 0px, #000 20px,
    #140b02 20px, #140b02 40px
  );
}

body {
  padding: 15px;
  display: flex;
  flex-direction: column;
}

/* ── 外枠 ── */
.system {
  flex: 1;
  min-height: 0;
  background: black;
  border: 2px solid #e07800;
  padding: 15px;
  display: flex;
  flex-direction: column;
  position: relative;
}

/* ── MAGI グリッド ── */
.magi {
  flex: 1;
  min-height: 0;
  display: grid;
  grid-template-columns:
    [left-header-start]
    20px
    [casper-start status]
    2fr
    [left-header-end balthasar-start casper-balthasar-connection]
    0.5fr
    [casper-end title casper-melchior-connection]
    1fr
    [balthasar-melchior-connection melchior-start]
    0.5fr
    [right-header-start balthasar-end response]
    2fr
    [melchior-end]
    20px
    [right-header-end];
  grid-template-rows:
    20px
    [header balthasar-start]
    2fr
    [status response]
    2fr
    [casper-start melchior-start casper-balthasar-connection balthasar-melchior-connection]
    1fr
    [balthasar-end title casper-melchior-connection]
    3fr
    [casper-end melchior-end]
    20px;
  container-type: size;
  border: 2px solid #e07800;
}

/* ── MAGI タイトル ── */
.magi > .title {
  grid-column: casper-end / melchior-start;
  grid-row: status / casper-end;
  color: #e07800;
  font-size: min(6cqh, 3.5cqw);
  font-weight: 900;
  letter-spacing: 0.2em;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  z-index: 1;
}

/* ── ヘッダー (提訴 / 決議) ── */
.magi > .header {
  overflow: hidden;
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 2px;
}
.magi > .header > .rect-bar {
  height: 7px;
  border: 2px solid #277547;
  background: transparent;
  margin: 2px 8px;
  flex-shrink: 0;
}
.magi > .header > span {
  color: #e07800;
  font-size: min(8cqh, 4cqw);
  font-weight: 900;
  letter-spacing: 0.2em;
  display: flex;
  justify-content: center;
  transform: scaleX(1.6);
}
.magi > .header.left  { grid-area: header / left-header-start  / auto / left-header-end; }
.magi > .header.right { grid-area: header / right-header-start / auto / right-header-end; }

/* ── システムステータス ── */
.magi > .system-status {
  grid-area: status;
  font-family: 'Lucida Console', 'Courier New', monospace;
  color: #e07800;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  padding-bottom: 0.8cqh;
}
.magi > .system-status > div {
  font-size: min(2.5cqh, 1.4cqw);
  margin-left: 2cqw;
  transform: scaleX(1.15);
  transform-origin: left;
  white-space: nowrap;
}
.magi > .system-status > div:first-child {
  font-size: min(5cqh, 2.6cqw);
  margin-left: 0;
}

/* ── 裁決バッジ ── */
.magi > .response {
  grid-area: response;
  justify-self: flex-end;
  align-self: center;
  border: solid 2px currentColor;
  padding: 2px;
  color: #3caee0;
  cursor: default;
  transition: color 0.4s;
}
.magi > .response > .inner {
  white-space: nowrap;
  border: solid 2px currentColor;
  padding: 2px 10px;
  font-size: min(7cqh, 3.8cqw);
  font-weight: 900;
  letter-spacing: 0.18em;
}

/* ── パネル共通 ── */
.magi > .wise-man {
  display: flex;
  background: #e07800;
  padding: 2px;
  cursor: pointer;
  transition: filter 0.2s;
}
.magi > .wise-man:hover { filter: brightness(1.2); }

.magi > .wise-man > .inner {
  width: 100%;
  height: 100%;
  font-size: min(5.5cqh, 2.8cqw);
  font-weight: 900;
  display: flex;
  flex-direction: row;
  align-items: center;
  justify-content: center;
  background: #3caee0;
  color: #000;
  letter-spacing: 0.08em;
  text-align: center;
  line-height: 1;
  transition: background 0.5s, color 0.5s;
  gap: 0.3em;
  overflow: hidden;
}

/* パネル形状 */
.magi > .wise-man.melchior {
  grid-area: melchior-start / melchior-start / melchior-end / melchior-end;
}
.magi > .wise-man.melchior,
.magi > .wise-man.melchior > .inner {
  clip-path: polygon(35% 0, 100% 0, 100% 100%, 0 100%, 0 44%);
}

.magi > .wise-man.balthasar {
  grid-area: balthasar-start / balthasar-start / balthasar-end / balthasar-end;
}
.magi > .wise-man.balthasar,
.magi > .wise-man.balthasar > .inner {
  clip-path: polygon(0 0, 100% 0, 100% 80%, 75% 100%, 25% 100%, 0 80%);
}

.magi > .wise-man.casper {
  grid-area: casper-start / casper-start / casper-end / casper-end;
}
.magi > .wise-man.casper,
.magi > .wise-man.casper > .inner {
  clip-path: polygon(0 0, 65% 0, 100% 44%, 100% 100%, 0 100%);
}

/* ── アニメーション ── */
@keyframes panel-flicker {
  0%  {}
  50% { background: #000 !important; color: #000 !important; }
}
@keyframes badge-flicker {
  0%  {}
  50% { opacity: 0; }
}

.panel-voting > .inner { animation: panel-flicker 0.25s infinite step-end; }
.badge-voting          { animation: badge-flicker 0.3s  infinite step-end; }

/* ── 接続ライン ── */
.connection {
  height: 14px;
  background: #e07800;
  align-self: center;
  margin: -10%;
}
.connection.casper-balthasar   { grid-area: casper-balthasar-connection;  transform: rotate(-54deg); }
.connection.casper-melchior    { grid-area: casper-melchior-connection; }
.connection.balthasar-melchior { grid-area: balthasar-melchior-connection; transform: rotate(54deg); }

/* ── 情報バッジにカーソルを示す ── */
.magi > .response { cursor: pointer; }
.magi > .response:hover { filter: brightness(1.2); }

/* ── 入力浮窗（情報クリックで出現） ── */
.input-modal {
  display: none;
  position: absolute;
  right: 15px;
  top: 15px;
  z-index: 60;
  border: 2px solid #e07800;
  background: #000;
  color: #e07800;
  font-family: 'Lucida Console', 'Courier New', monospace;
  min-width: 320px;
  max-width: 480px;
}
.input-modal.open { display: block; }

.input-modal-header {
  display: flex;
  border-bottom: 2px solid #e07800;
}
.input-modal-title {
  flex: 1;
  padding: 5px 8px;
  font-size: 11px;
  font-weight: bold;
  letter-spacing: 2px;
  background: repeating-linear-gradient(45deg,#000 0,#000 10px,#1a0d00 10px,#1a0d00 20px);
}
.input-modal-close {
  padding: 5px 10px;
  border-left: 2px solid #e07800;
  cursor: pointer;
  font-weight: bold;
  font-size: 13px;
}
.input-modal-close:hover { background: #e07800; color: #000; }

.input-modal-body {
  padding: 12px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.input-modal-body label {
  font-size: 11px;
  font-weight: bold;
  letter-spacing: 2px;
  opacity: .7;
}
.input-modal-body input {
  width: 100%;
  background: #0e0800;
  border: 2px solid #e07800;
  color: #e07800;
  font-family: 'Lucida Console', 'Courier New', monospace;
  font-size: 13px;
  padding: 5px 8px;
  outline: none;
}
.input-modal-body input:focus        { border-color: #ffc060; }
.input-modal-body input::placeholder { color: rgba(255,141,0,.3); }

.submit-btn {
  align-self: flex-end;
  background: transparent;
  border: 2px solid #e07800;
  color: #e07800;
  font-family: 'Noto Serif JP', serif;
  font-size: 13px;
  font-weight: 900;
  padding: 5px 18px;
  letter-spacing: 3px;
  cursor: pointer;
  transition: background .15s, color .15s;
  white-space: nowrap;
  margin-top: 2px;
}
.submit-btn:hover:not(:disabled) { background: #e07800; color: #000; }
.submit-btn:disabled              { opacity: .35; cursor: not-allowed; }

/* ── モーダル ── */
.modal {
  display: none;
  position: absolute;
  border: 2px solid #e07800;
  background: #000;
  color: #e07800;
  font-family: 'Lucida Console', 'Courier New', monospace;
  max-width: 55%;
  min-width: 290px;
  top: 8%;
  right: 8%;
  z-index: 50;
}
.modal-header {
  display: flex;
  border-bottom: 2px solid #e07800;
}
.modal-title {
  flex: 1;
  padding: 5px 8px;
  font-size: 11px;
  font-weight: bold;
  letter-spacing: 1px;
  background: repeating-linear-gradient(45deg,#000 0,#000 10px,#1a0d00 10px,#1a0d00 20px);
}
.modal-close {
  padding: 5px 10px;
  border-left: 2px solid #e07800;
  cursor: pointer;
  font-weight: bold;
  font-size: 13px;
}
.modal-close:hover { background: #e07800; color: #000; }
.modal-body {
  display: grid;
  grid-template-columns: auto 1fr;
  column-gap: 10px;
  row-gap: 5px;
  padding: 12px;
  font-size: 12px;
}
.mb-label { font-weight: bold; white-space: nowrap; opacity: .65; }
.mb-value  { word-break: break-word; line-height: 1.5; }
</style>
</head>
<body>

<div class="system">
  <div class="magi">

    <div class="header left">
      <div class="rect-bar"></div><div class="rect-bar"></div>
      <span>提　訴</span>
      <div class="rect-bar"></div><div class="rect-bar"></div>
    </div>

    <div class="header right">
      <div class="rect-bar"></div><div class="rect-bar"></div>
      <span>決　議</span>
      <div class="rect-bar"></div><div class="rect-bar"></div>
    </div>

    <div class="system-status">
      <div>CODE:<span id="code-num">473</span></div>
      <div>FILE:MAGI_SYS</div>
      <div>EXTENSION:3023</div>
      <div>EX_MODE:OFF</div>
      <div>PRIORITY:AAA</div>
    </div>

    <div class="response" id="response">
      <div class="inner" id="response-inner">情　報</div>
    </div>

    <div class="title">MAGI</div>

    <div class="connection casper-balthasar"></div>
    <div class="connection casper-melchior"></div>
    <div class="connection balthasar-melchior"></div>

    <div class="wise-man balthasar" id="wm-balthasar">
      <div class="inner" id="inner-balthasar">BALTHASAR • 2</div>
    </div>

    <div class="wise-man casper" id="wm-casper">
      <div class="inner" id="inner-casper">CASPER • 3</div>
    </div>

    <div class="wise-man melchior" id="wm-melchior">
      <div class="inner" id="inner-melchior">MELCHIOR • 1</div>
    </div>

  </div><!-- .magi -->

  <!-- 情報バッジクリックで開く入力浮窗 -->
  <div class="input-modal" id="inputModal">
    <div class="input-modal-header">
      <div class="input-modal-title">MAGI — 審議提訴入力</div>
      <div class="input-modal-close" id="inputModalClose">✕</div>
    </div>
    <div class="input-modal-body">
      <label>識別碼</label>
      <input type="password" id="accessInput" autocomplete="off" placeholder="••••••••" />
      <label>諮　問</label>
      <input type="text" id="queryInput" autocomplete="off"
             placeholder="輸入審議事項，按 Enter 提交" />
      <button class="submit-btn" id="submitBtn">起　動</button>
    </div>
  </div>

  <!-- 三個面板的詳情模態 -->
  <div class="modal" id="modal-balthasar">
    <div class="modal-header">
      <div class="modal-title">BALTHASAR • 2 — MAGI-02</div>
      <div class="modal-close" data-modal="modal-balthasar">✕</div>
    </div>
    <div class="modal-body">
      <div class="mb-label">諮問</div><div class="mb-value" id="mq-balthasar">—</div>
      <div class="mb-label">裁決</div><div class="mb-value" id="ms-balthasar">—</div>
      <div class="mb-label">回答</div><div class="mb-value" id="mr-balthasar">—</div>
    </div>
  </div>

  <div class="modal" id="modal-casper">
    <div class="modal-header">
      <div class="modal-title">CASPER • 3 — MAGI-03</div>
      <div class="modal-close" data-modal="modal-casper">✕</div>
    </div>
    <div class="modal-body">
      <div class="mb-label">諮問</div><div class="mb-value" id="mq-casper">—</div>
      <div class="mb-label">裁決</div><div class="mb-value" id="ms-casper">—</div>
      <div class="mb-label">回答</div><div class="mb-value" id="mr-casper">—</div>
    </div>
  </div>

  <div class="modal" id="modal-melchior">
    <div class="modal-header">
      <div class="modal-title">MELCHIOR • 1 — MAGI-01</div>
      <div class="modal-close" data-modal="modal-melchior">✕</div>
    </div>
    <div class="modal-body">
      <div class="mb-label">諮問</div><div class="mb-value" id="mq-melchior">—</div>
      <div class="mb-label">裁決</div><div class="mb-value" id="ms-melchior">—</div>
      <div class="mb-label">回答</div><div class="mb-value" id="mr-melchior">—</div>
    </div>
  </div>

</div><!-- .system -->

<script>
(function () {
  'use strict';

  /* ── 狀態定義 ── */
  const BADGE = {
    info:   { text: '情　報', color: '#3caee0' },
    voting: { text: '審議中', color: '#ffff00' },
    yes:    { text: '通　過', color: '#52e691' },
    no:     { text: '拒　絶', color: '#c01212' },
    error:  { text: '誤　差', color: '#888'    },
  };

  const PANEL = {
    yes:   { bg: '#52e691', color: '#000',    text: '承　認' },
    no:    { bg: '#c01212', color: '#ffcccc', text: '拒　絶' },
    info:  { bg: '#3caee0', color: '#000',    text: null },
    error: { bg: '#222',    color: '#888',    text: '誤　差' },
  };

  /* ── DOM ── */
  const codeEl     = document.getElementById('code-num');
  const queryEl    = document.getElementById('queryInput');
  const submitBtn  = document.getElementById('submitBtn');
  const responseEl = document.getElementById('response');
  const responseIn = document.getElementById('response-inner');

  const PANELS = {
    balthasar: { wm: document.getElementById('wm-balthasar'), inner: document.getElementById('inner-balthasar'), label: 'BALTHASAR', num: '• 2' },
    casper:    { wm: document.getElementById('wm-casper'),    inner: document.getElementById('inner-casper'),    label: 'CASPER',    num: '• 3' },
    melchior:  { wm: document.getElementById('wm-melchior'),  inner: document.getElementById('inner-melchior'),  label: 'MELCHIOR',  num: '• 1' },
  };

  let processing      = false;
  let lastQuery       = '';
  let panelData       = {};
  let currentState    = 'info';

  /* ── バッジ設定 ── */
  function setBadge(state) {
    currentState = state;
    const s = BADGE[state] || BADGE.info;
    responseEl.style.color = s.color;
    responseIn.textContent = s.text;
  }

  /* ── パネルをラベル表示に戻す ── */
  function resetPanelInner(name) {
    const el = PANELS[name].inner;
    el.style.background = PANEL.info.bg;
    el.style.color      = PANEL.info.color;
    el.textContent      = `${PANELS[name].label} ${PANELS[name].num}`;
  }

  /* ── パネルの背景色だけ変更（テキストはそのまま） ── */
  function setPanelVote(name, vote) {
    const p  = PANEL[vote] || PANEL.info;
    const el = PANELS[name].inner;
    el.style.background = p.bg;
    el.style.color      = p.color;
  }

  /* ── リセット ── */
  function reset() {
    processing = false;
    panelData  = {};
    Object.keys(PANELS).forEach(n => {
      PANELS[n].wm.classList.remove('panel-voting');
      resetPanelInner(n);
    });
    responseEl.classList.remove('badge-voting');
    setBadge('info');
    submitBtn.disabled    = false;
    submitBtn.textContent = '起　動';
  }

  /* ── 個別回答 → yes / no 判定 ── */
  function classifyVote(text) {
    if (!text) return 'error';
    // 拒否・否定
    if (/否决|否定|拒绝|反对|不同意|不支持|不通过|不允许|不赞成|reject|refuse|disagree|against/i.test(text)) return 'no';
    // 同意・承認
    if (/同意|支持|赞同|批准|赞成|通过|允许|认可|approve|agree|support|yes\b/i.test(text)) return 'yes';
    return 'yes'; // 不明な場合は承認扱い
  }

  /* ── 全体裁決 ── */
  function classifyOverall(data) {
    const v = data.verdict || '';
    if (/否决|否定|搁置/.test(v)) return 'no';
    if (/全体一致通过|全体同意|unanim/i.test(v)) return 'yes';
    const keys  = ['balthasar', 'casper', 'melchior'];
    const votes = keys.map(k => classifyVote(data[k] || ''));
    return votes.filter(x => x === 'no').length >= 2 ? 'no' : 'yes';
  }

  /* ── 審議実行 ── */
  async function deliberate() {
    const q = queryEl.value.trim();
    if (!q || processing) return;

    processing = true;
    lastQuery  = q;
    submitBtn.disabled    = true;
    submitBtn.textContent = '審　議';
    codeEl.textContent    = String(Math.floor(100 + Math.random() * 900));

    // 入力浮窗を閉じる
    closeInputModal();

    // 審議中バッジ（黄色フリッカー）
    setBadge('voting');
    responseEl.classList.add('badge-voting');

    // パネルフリッカー開始
    Object.keys(PANELS).forEach(n => PANELS[n].wm.classList.add('panel-voting'));

    try {
      const res = await fetch('/api/analyze', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ question: q }),
      });

      if (!res.ok) {
        const e = await res.json().catch(() => ({}));
        throw new Error(e.detail || 'HTTP ' + res.status);
      }

      const data = await res.json();
      panelData = data;

      // フリッカー停止
      Object.keys(PANELS).forEach(n => PANELS[n].wm.classList.remove('panel-voting'));
      responseEl.classList.remove('badge-voting');

      // 各パネルに裁決を反映
      Object.keys(PANELS).forEach(n => {
        const vote = classifyVote(data[n] || '');
        setPanelVote(n, vote);
      });

      // 全体バッジ
      setBadge(classifyOverall(data));

    } catch (err) {
      console.error('MAGI error:', err);
      Object.keys(PANELS).forEach(n => PANELS[n].wm.classList.remove('panel-voting'));
      responseEl.classList.remove('badge-voting');
      setBadge('error');
    } finally {
      processing = false;
      submitBtn.disabled    = false;
      submitBtn.textContent = '起　動';
    }
  }

  /* ── パネルクリック → 詳細モーダル ── */
  function openModal(name) {
    const apiKey = name; // data.balthasar / data.casper / data.melchior
    const vote   = panelData[apiKey] ? classifyVote(panelData[apiKey]) : null;
    document.getElementById('mq-' + name).textContent = lastQuery || '—';
    document.getElementById('ms-' + name).textContent = vote ? (BADGE[vote]?.text || '—') : '—';
    document.getElementById('mr-' + name).textContent = panelData[apiKey] || '—';
    document.querySelectorAll('.modal').forEach(m => { m.style.display = 'none'; });
    document.getElementById('modal-' + name).style.display = 'block';
  }

  /* ── 入力浮窗開閉 ── */
  const inputModal = document.getElementById('inputModal');

  function openInputModal() {
    if (processing) return;
    document.querySelectorAll('.modal').forEach(m => { m.style.display = 'none'; });
    inputModal.classList.add('open');
    queryEl.focus();
  }
  function closeInputModal() {
    inputModal.classList.remove('open');
  }

  responseEl.addEventListener('click', () => {
    if (currentState === 'yes' || currentState === 'no' || currentState === 'error') {
      reset();
    } else if (inputModal.classList.contains('open')) {
      closeInputModal();
    } else {
      openInputModal();
    }
  });

  document.getElementById('inputModalClose').addEventListener('click', closeInputModal);

  /* ── イベントバインド ── */
  Object.keys(PANELS).forEach(n => {
    PANELS[n].wm.addEventListener('click', () => openModal(n));
  });

  document.querySelectorAll('.modal-close').forEach(btn => {
    btn.addEventListener('click', () => {
      const id = btn.dataset.modal;
      if (id) document.getElementById(id).style.display = 'none';
    });
  });

  submitBtn.addEventListener('click', deliberate);

  queryEl.addEventListener('keydown', e => {
    if (e.key === 'Enter') deliberate();
  });

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      closeInputModal();
      document.querySelectorAll('.modal').forEach(m => { m.style.display = 'none'; });
    }
  });

  reset();
})();
</script>
</body>
</html>
