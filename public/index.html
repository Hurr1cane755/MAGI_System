<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAGI System Interface</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background-color: #050505;
    display: flex;
    justify-content: center;
    align-items: center;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    font-family: 'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif;
    color: #ff8c00;
    user-select: none;
  }

  /* ── 外层缩放容器 ── */
  .scale-container {
    display: flex;
    justify-content: center;
    align-items: center;
    width: 100vw;
    height: 100vh;
  }

  /* ── 主屏幕 1000×562，JS 动态 scale ── */
  .screen {
    position: relative;
    width: 1000px;
    height: 562px;
    background-color: #000;
    border: 3px solid #ff8c00;
    transform-origin: center center;
    flex-shrink: 0;
  }

  /* 内层装饰边框 */
  .border-accent {
    position: absolute;
    top: 5px; left: 5px; right: 5px; bottom: 5px;
    border: 1px solid #ff8c00;
    pointer-events: none;
    z-index: 10;
  }

  /* 上下警示条纹 */
  .hazard-top, .hazard-bottom {
    position: absolute;
    left: -3px; right: -3px;
    height: 12px;
    background: repeating-linear-gradient(
      -45deg,
      #000 0, #000 10px,
      #995500 10px, #995500 20px
    );
    border: 1px solid #000;
  }
  .hazard-top    { top: -15px; }
  .hazard-bottom { bottom: -15px; }

  /* ── 左上角 ── */
  .top-left {
    position: absolute;
    top: 28px;
    left: 40px;
  }
  .jp-title {
    font-family: 'Impact', 'Microsoft YaHei', sans-serif;
    font-size: 60px;
    font-weight: 900;
    letter-spacing: 14px;
    line-height: 1;
    transform: scaleX(1.1);
    transform-origin: left;
    display: block;
  }
  .green-lines {
    width: 260px;
    height: 6px;
    border-top: 2px solid #4caf50;
    border-bottom: 2px solid #4caf50;
    margin-top: 7px;
    margin-bottom: 12px;
  }
  .code-block {
    font-family: 'Courier New', Courier, monospace;
    font-size: 14px;
    line-height: 1.4;
    font-weight: bold;
    letter-spacing: 1px;
  }
  .code-main {
    font-size: 24px;
    margin-bottom: 4px;
  }

  /* ── 右上角 ── */
  .top-right {
    position: absolute;
    top: 28px;
    right: 40px;
    text-align: right;
  }
  .top-right .jp-title { transform-origin: right; }
  .top-right .green-lines { float: right; }

  /* 情報徽章 */
  .info-badge {
    position: absolute;
    top: 128px;
    right: 40px;
    border: 3px solid #40BBE3;
    padding: 5px 11px;
    color: #40BBE3;
    font-size: 28px;
    font-weight: bold;
    font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
    letter-spacing: 5px;
  }

  /* 最終裁決徽章 */
  #verdict {
    display: none;
    position: absolute;
    top: 195px;
    right: 40px;
    font-size: 26px;
    font-weight: bold;
    font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
    letter-spacing: 4px;
    padding: 4px 12px;
    border: 3px solid currentColor;
    z-index: 20;
  }
  #verdict.resolve { display: block; color: #4caf50; }
  #verdict.reject  { display: block; color: #cc0000; }

  /* ── MAGI 面板系统 ── */
  .magi-system {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -52%);
    width: 860px;
    height: 370px;
  }

  /* 通用面板 */
  .panel {
    position: absolute;
    background-color: #40BBE3;
    color: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
    font-size: 30px;
    font-weight: 900;
    letter-spacing: 2px;
    text-align: center;
    padding: 8px;
    transition: background-color 0.3s;
  }
  .panel .panel-content {
    font-size: inherit;
    line-height: 1.2;
    word-break: break-word;
    max-width: 100%;
  }
  .panel.summary .panel-content {
    font-size: 13px;
    font-weight: bold;
    letter-spacing: 0;
    line-height: 1.4;
  }

  /* BALTHASAR — 上方居中，六边形 */
  .balthasar {
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 320px;
    height: 210px;
    clip-path: polygon(0 0, 100% 0, 100% 75%, 65% 100%, 35% 100%, 0 75%);
    padding-bottom: 28px;
  }

  /* CASPER — 左下 */
  .casper {
    bottom: 0;
    left: 20px;
    width: 340px;
    height: 185px;
    clip-path: polygon(0 20%, 60% 20%, 100% 55%, 100% 100%, 0 100%);
    padding-top: 28px;
    padding-right: 35px;
  }

  /* MELCHIOR — 右下 */
  .melchior {
    bottom: 0;
    right: 20px;
    width: 340px;
    height: 185px;
    clip-path: polygon(0 55%, 40% 20%, 100% 20%, 100% 100%, 0 100%);
    padding-top: 28px;
    padding-left: 35px;
  }

  /* 橙色连接线 */
  .connector { position: absolute; background-color: #ff8c00; }
  .conn-left {
    width: 55px; height: 7px;
    top: 196px; left: 328px;
    transform: rotate(43deg);
  }
  .conn-right {
    width: 55px; height: 7px;
    top: 196px; right: 328px;
    transform: rotate(-43deg);
  }
  .conn-bottom {
    width: 130px; height: 7px;
    bottom: 112px; left: 50%;
    transform: translateX(-50%);
  }
  .conn-base {
    width: 130px; height: 46px;
    bottom: 66px; left: 50%;
    transform: translateX(-50%);
    background-color: #000;
    border-left: 7px solid #ff8c00;
    border-right: 7px solid #ff8c00;
    z-index: -1;
  }

  /* 中央 MAGI */
  .magi-text {
    position: absolute;
    top: 232px;
    left: 50%;
    transform: translateX(-50%);
    color: #ff8c00;
    font-family: 'Times New Roman', Times, serif;
    font-size: 38px;
    font-weight: bold;
    letter-spacing: 5px;
    white-space: nowrap;
  }

  /* ── 底部输入区 ── */
  .terminal-inputs {
    position: absolute;
    bottom: 15px;
    left: 45px;
    right: 45px;
  }
  .input-line {
    display: flex;
    align-items: center;
    margin-bottom: 5px;
    font-size: 15px;
    font-weight: bold;
    font-family: 'Courier New', Courier, monospace;
  }
  .input-label {
    width: 125px;
    flex-shrink: 0;
    color: #ff8c00;
  }
  .input-dots {
    flex-grow: 1;
    border: 1px solid #ff8c00;
    height: 22px;
    display: flex;
    align-items: center;
    padding: 0 8px;
    color: #ff8c00;
    letter-spacing: 3px;
  }
  #question-input {
    flex-grow: 1;
    background: #000;
    border: 1px solid #ff8c00;
    color: #ff8c00;
    font-family: 'Courier New', Courier, monospace;
    font-size: 15px;
    padding: 0 8px;
    height: 22px;
    outline: none;
  }
  #question-input::placeholder { opacity: 0.3; }
  #question-input.error { border-color: #cc0000; }

  #activate-btn {
    margin-top: 7px;
    background: #000;
    border: 2px solid #ff8c00;
    color: #ff8c00;
    font-family: 'Courier New', Courier, monospace;
    font-size: 15px;
    padding: 3px 18px;
    cursor: pointer;
    letter-spacing: 3px;
    transition: background 0.15s, color 0.15s;
  }
  #activate-btn:hover  { background: #ff8c00; color: #000; }
  #activate-btn:disabled { opacity: 0.35; cursor: not-allowed; }

  /* ── 投票动画 ── */
  .panel.voting { animation: panel-flash 0.4s infinite step-end; }
  @keyframes panel-flash { 50% { background-color: #ff0000; } }

  /* 投票结果颜色 */
  .panel.resolve { background-color: #4caf50 !important; animation: none !important; }
  .panel.reject  { background-color: #cc0000 !important; animation: none !important; }
</style>
</head>
<body>

<div class="scale-container">
  <div style="position: relative;">
    <div class="hazard-top"></div>

    <div class="screen">
      <div class="border-accent"></div>

      <!-- 左上角 -->
      <div class="top-left">
        <span class="jp-title">質問</span>
        <div class="green-lines"></div>
        <div class="code-block">
          <div class="code-main">CODE:<span id="code-num">473</span></div>
          <div>&nbsp;&nbsp;FILE:MAGI_SYS</div>
          <div>&nbsp;&nbsp;EXTENTION:3023</div>
          <div>&nbsp;&nbsp;EX_MODE:OFF</div>
          <div>&nbsp;&nbsp;PRIORITY:AAA</div>
        </div>
      </div>

      <!-- 右上角 -->
      <div class="top-right">
        <span class="jp-title">解決</span>
        <div class="green-lines"></div>
      </div>
      <div class="info-badge">情報</div>

      <!-- 裁決徽章 -->
      <div id="verdict"></div>

      <!-- MAGI 面板系统 -->
      <div class="magi-system">
        <div class="panel balthasar" id="panel-balthasar">
          <span class="panel-content">BALTHASAR・2</span>
        </div>
        <div class="panel casper" id="panel-casper">
          <span class="panel-content">CASPER・3</span>
        </div>
        <div class="panel melchior" id="panel-melchior">
          <span class="panel-content">MELCHIOR・1</span>
        </div>

        <div class="connector conn-left"></div>
        <div class="connector conn-right"></div>
        <div class="connector conn-bottom"></div>
        <div class="conn-base"></div>

        <div class="magi-text">MAGI</div>
      </div>

      <!-- 底部输入区 -->
      <div class="terminal-inputs">
        <div class="input-line">
          <span class="input-label">access code:</span>
          <div class="input-dots">...................................</div>
        </div>
        <div class="input-line">
          <span class="input-label">question:</span>
          <input type="text" id="question-input"
                 placeholder="INPUT DECISION QUERY"
                 autocomplete="off">
        </div>
        <button id="activate-btn">ACTIVATE MAGI</button>
      </div>
    </div><!-- .screen -->

    <div class="hazard-bottom"></div>
  </div>
</div><!-- .scale-container -->

<script>
(function () {
  'use strict';

  /* ── 等比缩放适配屏幕 ── */
  function resizeScreen() {
    const scaleX = window.innerWidth  / 1060;
    const scaleY = window.innerHeight / 620;
    const scale  = Math.min(scaleX, scaleY);
    document.querySelector('.screen').style.transform = 'scale(' + scale + ')';
  }
  window.addEventListener('resize', resizeScreen);
  resizeScreen();

  /* ── refs ── */
  const panelB    = document.getElementById('panel-balthasar');
  const panelC    = document.getElementById('panel-casper');
  const panelM    = document.getElementById('panel-melchior');
  const qInput    = document.getElementById('question-input');
  const actBtn    = document.getElementById('activate-btn');
  const verdictEl = document.getElementById('verdict');
  const codeEl    = document.getElementById('code-num');

  let voted = false;

  /* ── code ticker ── */
  const randCode = () => {
    codeEl.textContent = String(100 + Math.floor(Math.random() * 900));
  };

  /* ── reset ── */
  const doReset = () => {
    voted = false;
    actBtn.disabled = false;
    actBtn.textContent = 'ACTIVATE MAGI';
    verdictEl.className = '';
    verdictEl.textContent = '';
    [panelB, panelC, panelM].forEach(p => {
      p.className = p.className.replace(/\s*(voting|resolve|reject|summary)\b/g, '');
    });
    panelB.querySelector('.panel-content').textContent = 'BALTHASAR・2';
    panelC.querySelector('.panel-content').textContent = 'CASPER・3';
    panelM.querySelector('.panel-content').textContent = 'MELCHIOR・1';
  };

  /* ── extract first N chars (skip decorative lines) ── */
  const excerpt = (text, max) => {
    if (!text) return '';
    const lines = (text + '').split('\n')
      .map(l => l.trim())
      .filter(l => l && !/^[【={▸]/.test(l));
    return lines.join(' ').slice(0, max || 100);
  };

  /* ── apply result to a panel ── */
  const setPanel = (el, text, status) => {
    el.querySelector('.panel-content').textContent = text;
    el.classList.add('summary');
    el.classList.remove('voting');
    el.classList.remove('resolve');
    el.classList.remove('reject');
    el.classList.add(status);
  };

  /* ── parse verdict ── */
  const parseVerdict = v => {
    v = v || '';
    if (/否决|否定|搁置/.test(v)) {
      return { b: 'reject', c: 'reject', m: 'reject', final: 'reject' };
    }
    if (/二比一/.test(v)) {
      return { b: 'resolve', c: 'reject', m: 'resolve', final: 'resolve' };
    }
    return { b: 'resolve', c: 'resolve', m: 'resolve', final: 'resolve' };
  };

  /* ── main activate ── */
  const activate = async () => {
    if (voted) { doReset(); return; }

    const q = qInput.value.trim();
    if (!q) {
      qInput.classList.add('error');
      qInput.focus();
      setTimeout(() => qInput.classList.remove('error'), 600);
      return;
    }

    actBtn.disabled = true;
    randCode();
    [panelB, panelC, panelM].forEach(p => p.classList.add('voting'));

    try {
      const res = await fetch('/api/analyze', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question: q }),
      });
      if (!res.ok) {
        const e = await res.json().catch(() => ({}));
        throw new Error(e.detail || 'HTTP ' + res.status);
      }

      const data = await res.json();
      const v    = parseVerdict(data.verdict);

      setPanel(panelB, excerpt(data.balthasar, 100), v.b);
      setPanel(panelC, excerpt(data.casper,    100), v.c);
      setPanel(panelM, excerpt(data.melchior,  100), v.m);

      verdictEl.className   = v.final;
      verdictEl.textContent = v.final === 'resolve' ? '承認' : '否定';

      voted = true;
      actBtn.disabled = false;
      actBtn.textContent = 'RESET';

    } catch (err) {
      console.error('MAGI error:', err);
      [panelB, panelC, panelM].forEach(p => p.classList.remove('voting'));
      actBtn.disabled = false;
    }
  };

  /* ── events ── */
  actBtn.addEventListener('click', activate);
  qInput.addEventListener('keydown', e => { if (e.key === 'Enter') activate(); });
  window.addEventListener('keydown', e => {
    if (e.code === 'Space' && e.target === document.body) {
      e.preventDefault();
      activate();
    }
  });
})();
</script>
</body>
</html>
