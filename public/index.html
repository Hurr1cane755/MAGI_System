<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MAGI System</title>
<style>
/* ── 完全按照 TomaszRewak/MAGI assets/style.css ── */

html {
  background: repeating-linear-gradient(
    45deg,
    rgb(0 0 0) 0px, rgb(0 0 0) 20px,
    #140b02 20px, #140b02 40px
  );
  min-height: 100vh;
}

body {
  margin: 15px;
}

.system {
  background: black;
  border: 2px solid #ff8d00;
  padding: 15px;
  max-width: 1200px;
  display: flex;
  flex-direction: column;
  position: relative;
  margin: 0 auto;
}

.magi {
  display: grid;
  grid-template-columns:
    [left-header-start]
    20px
    [casper-start status]
    2fr
    [left-header-end balthasar-start casper-balthasar-connection]
    0.5fr
    [casper-end title casper-melchior-connection]
    1fr
    [balthasar-melchior-connection melchior-start]
    0.5fr
    [right-header-start balthasar-end response]
    2fr
    [melchior-end]
    20px
    [right-header-end];
  grid-template-rows:
    20px
    [header balthasar-start]
    2fr
    [status response]
    2fr
    [casper-start melchior-start casper-balthasar-connection balthasar-melchior-connection]
    1fr
    [balthasar-end title casper-melchior-connection]
    3fr
    [casper-end melchior-end]
    20px;
  aspect-ratio: 2 / 1;
  container-type: size;
  border: 2px solid #ff8d00;
}

.magi > .title {
  grid-area: title / title;
  color: #ff8d00;
  text-align: center;
  font-size: 9cqh;
  font-weight: bold;
  display: flex;
  align-items: center;
  justify-content: center;
}

.magi > .header {
  overflow: hidden;
}

.magi > .header > hr {
  border: 2px solid #277547;
  height: 4px;
  margin: 2px;
}

.magi > .header > span {
  color: #ff8d00;
  font-size: 10cqh;
  display: flex;
  justify-content: center;
  font-weight: bold;
  transform: scaleX(2);
}

.magi > .header.left  { grid-area: header / left-header-start  / auto / left-header-end; }
.magi > .header.right { grid-area: header / right-header-start / auto / right-header-end; }

.magi > .system-status {
  grid-area: status;
  font-family: 'Lucida Console', 'Courier New', monospace;
  color: #ff8d00;
}

.magi > .system-status > div {
  font-size: 3cqh;
  margin-left: 4cqw;
  transform: scaleX(1.2);
  transform-origin: left;
}

.magi > .system-status > div:first-child {
  font-size: 6cqh;
  margin-left: 0;
}

.magi > .response {
  grid-area: response;
  justify-self: flex-end;
  align-self: center;
  border: solid 2px;
  padding: 2px;
  /* color/borderColor set via JS */
  color: #3caee0;
  border-color: #3caee0;
  cursor: default;
}

.magi > .response > .inner {
  white-space: nowrap;
  border: solid 2px;
  padding: 2px 10px;
  font-size: 8cqh;
  font-weight: bold;
  border-color: inherit;
}

.magi > .wise-man {
  display: flex;
  background: #ff8d00;
  padding: 2px;
  cursor: pointer;
}

.magi > .wise-man > .inner {
  width: 100%;
  height: 100%;
  font-family: Helvetica, Arial, sans-serif;
  font-size: 8cqh;
  font-weight: bold;
  display: flex;
  align-items: center;
  justify-content: center;
  /* background set via JS */
  background: #3caee0;
}

.magi > .wise-man.melchior {
  grid-area: melchior-start / melchior-start / melchior-end / melchior-end;
}
.magi > .wise-man.melchior,
.magi > .wise-man.melchior > .inner {
  clip-path: polygon(35% 0, 100% 0, 100% 100%, 0 100%, 0 44%);
}

.magi > .wise-man.balthasar {
  grid-area: balthasar-start / balthasar-start / balthasar-end / balthasar-end;
}
.magi > .wise-man.balthasar,
.magi > .wise-man.balthasar > .inner {
  clip-path: polygon(0 0, 100% 0, 100% 80%, 75% 100%, 25% 100%, 0 80%);
}

.magi > .wise-man.casper {
  grid-area: casper-start / casper-start / casper-end / casper-end;
}
.magi > .wise-man.casper,
.magi > .wise-man.casper > .inner {
  clip-path: polygon(0 0, 65% 0, 100% 44%, 100% 100%, 0 100%);
}

@keyframes flicker-animation {
  0%   {}
  50%  { background: black; color: black; border-color: black; }
}

.flicker {
  animation: flicker-animation 0.25s infinite step-end;
}

.connection {
  height: 10px;
  background: #ff8d00;
  align-self: center;
  margin: -10%;
}
.connection.casper-balthasar  { grid-area: casper-balthasar-connection;  transform: rotate(-54deg); }
.connection.casper-melchior   { grid-area: casper-melchior-connection; }
.connection.balthasar-melchior { grid-area: balthasar-melchior-connection; transform: rotate(54deg); }

/* ── 入力コンテナ（.magi の下） ── */
.input-container {
  display: grid;
  grid-template-columns: auto 1fr;
  color: #ff8d00;
  font-family: 'Lucida Console', 'Courier New', monospace;
  column-gap: 10px;
  row-gap: 5px;
  margin-top: 15px;
  align-items: center;
}

.input-container > label {
  font-size: 14px;
  font-weight: bold;
  white-space: nowrap;
}

.input-container > input {
  background: #1f1203;
  border: 2px solid #ff8d00;
  color: #ff8d00;
  font-family: 'Lucida Console', 'Courier New', monospace;
  font-size: 14px;
  padding: 3px 6px;
  outline: none;
}

.input-container > input:focus {
  border-color: #ffb84d;
}

.input-container > input::placeholder {
  color: rgba(255, 141, 0, 0.35);
}

/* ── モーダル ── */
.modal {
  border: 2px solid #ff8d00;
  color: #ff8d00;
  font-family: 'Lucida Console', 'Courier New', monospace;
  position: absolute;
  background: black;
  max-width: 60%;
  min-width: 320px;
  top: 10%;
  right: 10%;
  z-index: 50;
}

.modal > .modal-header {
  display: flex;
  flex-direction: row;
  border-bottom: 2px solid #ff8d00;
}

.modal > .modal-header > .modal-title {
  flex: 1;
  padding: 5px;
  font-size: 13px;
  font-weight: bold;
  letter-spacing: 1px;
  background: repeating-linear-gradient(
    45deg,
    rgb(0 0 0) 0px, rgb(0 0 0) 10px,
    #211200 10px, #211200 20px
  );
}

.modal > .modal-header > .close {
  padding: 5px 9px;
  border-left: 2px solid #ff8d00;
  cursor: pointer;
  font-weight: bold;
  font-size: 14px;
}
.modal > .modal-header > .close:hover {
  background: #ff8d00;
  color: black;
}

.modal > .modal-body {
  display: grid;
  grid-template-columns: auto 1fr;
  column-gap: 10px;
  row-gap: 6px;
  padding: 12px;
  font-size: 12px;
}

.modal > .modal-body > .mb-label {
  font-weight: bold;
  white-space: nowrap;
  opacity: 0.7;
}

.modal > .modal-body > .mb-value {
  word-break: break-word;
  line-height: 1.45;
}
</style>
</head>
<body>

<div class="system">

  <!-- ── MAGI グリッド ── -->
  <div class="magi">

    <!-- 左ヘッダー：質 問 -->
    <div class="header left">
      <hr><hr>
      <span>質 問</span>
      <hr><hr>
    </div>

    <!-- 右ヘッダー：解 決 -->
    <div class="header right">
      <hr><hr>
      <span>解 決</span>
      <hr><hr>
    </div>

    <!-- システムステータス -->
    <div class="system-status">
      <div>CODE:<span id="code-num">473</span></div>
      <div>FILE:MAGI_SYS</div>
      <div>EXTENTION:3023</div>
      <div>EX_MODE:OFF</div>
      <div>PRIORITY:AAA</div>
    </div>

    <!-- 裁決バッジ（右上）：常時表示 -->
    <div class="response" id="response">
      <div class="inner" id="response-inner">情 報</div>
    </div>

    <!-- 中央タイトル -->
    <div class="title">MAGI</div>

    <!-- 接続ライン -->
    <div class="connection casper-balthasar"></div>
    <div class="connection casper-melchior"></div>
    <div class="connection balthasar-melchior"></div>

    <!-- BALTHASAR・2 -->
    <div class="wise-man balthasar" id="wm-balthasar">
      <div class="inner" id="inner-balthasar">BALTHASAR • 2</div>
    </div>

    <!-- CASPER・3 -->
    <div class="wise-man casper" id="wm-casper">
      <div class="inner" id="inner-casper">CASPER • 3</div>
    </div>

    <!-- MELCHIOR・1 -->
    <div class="wise-man melchior" id="wm-melchior">
      <div class="inner" id="inner-melchior">MELCHIOR • 1</div>
    </div>

  </div><!-- .magi -->

  <!-- ── 入力エリア（.magi の下） ── -->
  <div class="input-container">
    <label>access code:</label>
    <input type="password" id="accessInput" autocomplete="off" placeholder="••••••••••••" />
    <label>question:</label>
    <input type="text" id="queryInput" autocomplete="off"
           placeholder="Enter deliberation query and press Enter…" />
  </div>

  <!-- ── 各パネルのモーダル（3つ） ── -->
  <div class="modal" id="modal-balthasar" style="display:none;">
    <div class="modal-header">
      <div class="modal-title">BALTHASAR • 2 — MAGI-02</div>
      <div class="close" data-modal="modal-balthasar">X</div>
    </div>
    <div class="modal-body">
      <div class="mb-label">question:</div>
      <div class="mb-value" id="mq-balthasar">—</div>
      <div class="mb-label">status:</div>
      <div class="mb-value" id="ms-balthasar">—</div>
      <div class="mb-label">response:</div>
      <div class="mb-value" id="mr-balthasar">—</div>
    </div>
  </div>

  <div class="modal" id="modal-casper" style="display:none;">
    <div class="modal-header">
      <div class="modal-title">CASPER • 3 — MAGI-03</div>
      <div class="close" data-modal="modal-casper">X</div>
    </div>
    <div class="modal-body">
      <div class="mb-label">question:</div>
      <div class="mb-value" id="mq-casper">—</div>
      <div class="mb-label">status:</div>
      <div class="mb-value" id="ms-casper">—</div>
      <div class="mb-label">response:</div>
      <div class="mb-value" id="mr-casper">—</div>
    </div>
  </div>

  <div class="modal" id="modal-melchior" style="display:none;">
    <div class="modal-header">
      <div class="modal-title">MELCHIOR • 1 — MAGI-01</div>
      <div class="close" data-modal="modal-melchior">X</div>
    </div>
    <div class="modal-body">
      <div class="mb-label">question:</div>
      <div class="mb-value" id="mq-melchior">—</div>
      <div class="mb-label">status:</div>
      <div class="mb-value" id="ms-melchior">—</div>
      <div class="mb-label">response:</div>
      <div class="mb-value" id="mr-melchior">—</div>
    </div>
  </div>

</div><!-- .system -->

<script>
(function () {
  'use strict';

  /* ── ステータス定義（参照実装に完全対応） ── */
  const STATUS = {
    info:        { text: '情 報', color: '#3caee0',
                   bg: '#3caee0' },
    yes:         { text: '合 意', color: '#52e691',
                   bg: '#52e691' },
    no:          { text: '拒 絶', color: '#a41413',
                   bg: '#a41413' },
    conditional: { text: '状 態', color: '#ff8d00',
                   bg: 'repeating-linear-gradient(56deg, rgb(82,230,145) 0px, rgb(82,230,145) 30px, #82cd68 30px, #82cd68 60px)' },
    error:       { text: '誤 差', color: 'gray',
                   bg: 'black' },
  };

  /* ── DOM refs ── */
  const codeEl   = document.getElementById('code-num');
  const queryEl  = document.getElementById('queryInput');
  const responseEl    = document.getElementById('response');
  const responseInner = document.getElementById('response-inner');

  const panels = {
    balthasar: {
      wm:    document.getElementById('wm-balthasar'),
      inner: document.getElementById('inner-balthasar'),
      label: 'BALTHASAR • 2',
    },
    casper: {
      wm:    document.getElementById('wm-casper'),
      inner: document.getElementById('inner-casper'),
      label: 'CASPER • 3',
    },
    melchior: {
      wm:    document.getElementById('wm-melchior'),
      inner: document.getElementById('inner-melchior'),
      label: 'MELCHIOR • 1',
    },
  };

  let processing = false;
  let lastQuery  = '';
  let panelData  = { balthasar: null, casper: null, melchior: null };

  /* ── パネルカラー適用 ── */
  function applyStatus(name, status) {
    const s = STATUS[status] || STATUS.info;
    panels[name].inner.style.background = s.bg;
    // reset font color for conditional (dark text on light bg)
    panels[name].inner.style.color = (status === 'no') ? '#ffbbbb' : '#000';
  }

  /* ── バッジ更新 ── */
  function applyResponseStatus(status) {
    const s = STATUS[status] || STATUS.info;
    responseEl.style.color       = s.color;
    responseEl.style.borderColor = s.color;
    responseInner.textContent    = s.text;
  }

  /* ── 初期化 ── */
  function reset() {
    processing = false;
    panelData  = { balthasar: null, casper: null, melchior: null };
    Object.keys(panels).forEach(n => {
      panels[n].inner.classList.remove('flicker');
      panels[n].inner.textContent = panels[n].label;
      applyStatus(n, 'info');
    });
    applyResponseStatus('info');
  }

  /* ── 個別回答をyes/no/conditionalに分類 ── */
  function classifyVote(text) {
    if (!text) return 'error';
    const t = text;
    if (/否决|否定|拒绝|反对|不同意|不支持|不赞成|reject|refuse|disagree/i.test(t)) return 'no';
    if (/条件|前提|有条件|但需|须满足|conditional|with cond|unless/i.test(t)) return 'conditional';
    if (/同意|支持|赞同|批准|赞成|通过|允许|approve|agree|support|yes/i.test(t)) return 'yes';
    return 'conditional';
  }

  /* ── 全体裁決を分類 ── */
  function classifyOverall(data) {
    const v = data.verdict || '';
    if (/否决|否定|搁置/.test(v)) return 'no';
    if (/全体一致通过|全体同意/.test(v)) return 'yes';
    if (/二比一/.test(v)) return 'conditional';
    // フォールバック：各パネルから集計
    const votes = Object.keys(panels).map(k => classifyVote(data[k] || ''));
    const noCnt = votes.filter(v => v === 'no').length;
    const yesCnt = votes.filter(v => v === 'yes').length;
    if (noCnt >= 2) return 'no';
    if (yesCnt === 3) return 'yes';
    return 'conditional';
  }

  /* ── 審議実行 ── */
  async function deliberate() {
    const q = queryEl.value.trim();
    if (!q || processing) return;

    processing = true;
    lastQuery  = q;
    codeEl.textContent = String(100 + Math.floor(Math.random() * 900));

    /* フリッカー開始 */
    Object.keys(panels).forEach(n => {
      panels[n].inner.classList.add('flicker');
    });
    responseEl.classList.add('flicker');

    try {
      const res = await fetch('/api/analyze', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question: q }),
      });

      if (!res.ok) {
        const e = await res.json().catch(() => ({}));
        throw new Error(e.detail || 'HTTP ' + res.status);
      }

      const data = await res.json();
      panelData = { balthasar: data.balthasar, casper: data.casper, melchior: data.melchior };

      /* フリッカー停止 */
      Object.keys(panels).forEach(n => panels[n].inner.classList.remove('flicker'));
      responseEl.classList.remove('flicker');

      /* 各パネルのステータスと表示テキストを更新 */
      const panelVotes = {};
      Object.keys(panels).forEach(n => {
        const vote = classifyVote(data[n] || '');
        panelVotes[n] = vote;
        applyStatus(n, vote);
        // パネル内には名前のままにする（クリックでモーダル表示）
      });

      /* 全体裁決バッジ */
      const overall = classifyOverall(data);
      applyResponseStatus(overall);

    } catch (err) {
      console.error('MAGI error:', err);
      Object.keys(panels).forEach(n => panels[n].inner.classList.remove('flicker'));
      responseEl.classList.remove('flicker');
      applyResponseStatus('error');
    } finally {
      processing = false;
    }
  }

  /* ── パネルクリック → モーダル表示 ── */
  function openModal(name) {
    const modal = document.getElementById('modal-' + name);
    if (!modal) return;

    document.getElementById('mq-' + name).textContent = lastQuery || '—';

    const vote = panelData[name] ? classifyVote(panelData[name]) : 'info';
    document.getElementById('ms-' + name).textContent = STATUS[vote]?.text || '情 報';
    document.getElementById('mr-' + name).textContent = panelData[name] || '—';

    // 他のモーダルを閉じる
    document.querySelectorAll('.modal').forEach(m => { m.style.display = 'none'; });
    modal.style.display = 'block';
  }

  /* ── イベント ── */
  Object.keys(panels).forEach(name => {
    panels[name].wm.addEventListener('click', () => openModal(name));
  });

  document.querySelectorAll('.close').forEach(btn => {
    btn.addEventListener('click', () => {
      const id = btn.dataset.modal;
      if (id) document.getElementById(id).style.display = 'none';
    });
  });

  queryEl.addEventListener('keydown', e => {
    if (e.key === 'Enter') deliberate();
  });

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      document.querySelectorAll('.modal').forEach(m => { m.style.display = 'none'; });
    }
  });

  /* ── 初期化実行 ── */
  reset();
})();
</script>
</body>
</html>
