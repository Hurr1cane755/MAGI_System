<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAGI-Link — AI Decision System</title>
<style>
/* === RESET === */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; overflow: hidden; }

body {
  background: #000;
  color: #ff6600;
  font-family: 'Courier New', Courier, monospace;
  /* double border: 1px outer thin + 4px inner thick */
  box-shadow:
    0 0 0 1px #ff6600 inset,
    0 0 0 12px #000    inset,
    0 0 0 16px #ff6600 inset;
  transition: color 1s ease, box-shadow 1s ease;
}
body.resolve {
  color: #33cc33;
  box-shadow: 0 0 0 1px #33cc33 inset, 0 0 0 12px #000 inset, 0 0 0 16px #33cc33 inset;
}
body.reject {
  color: #cc0000;
  box-shadow: 0 0 0 1px #cc0000 inset, 0 0 0 12px #000 inset, 0 0 0 16px #cc0000 inset;
}

/* === LAYOUT === */
#app {
  width: 100%; height: 100%;
  display: flex;
  flex-direction: column;
  padding: 16px;
}

/* === HEADER: 提訴 / 決議 === */
header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  flex-shrink: 0;
  padding: 0 0.1em;
}
.h-title {
  font-family: 'FOTMatisseProEB', 'Noto Serif CJK JP', serif;
  font-size: clamp(1.6em, 4.5vw, 3.2em);
  font-weight: 900;
  color: inherit;
  line-height: 1;
  letter-spacing: 0.06em;
  display: inline-block;
  transform: scaleY(0.82);
  position: relative;
  padding: 0.12em 0.18em;
}
.h-title::before,
.h-title::after {
  content: '';
  position: absolute;
  left: 0; right: 0;
  height: 2px;
  background: currentColor;
}
.h-title::before { top: 0;    box-shadow: 0 -5px 0 currentColor; }
.h-title::after  { bottom: 0; box-shadow: 0  5px 0 currentColor; }

/* === TOP INFO ROW === */
#top-row {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  flex-shrink: 0;
  padding: 0.3em 0.1em 0.2em;
}
#info-block {
  font-size: clamp(0.48em, 1.1vw, 0.72em);
  line-height: 1.9;
  color: inherit;
}
#info-block .row { display: flex; gap: 0.4em; }
#info-block .lbl { opacity: 0.65; min-width: 7.5em; }
#info-block b { cursor: pointer; }
#info-block b:hover { opacity: 0.6; }

#info-btn {
  font-family: serif;
  font-size: clamp(0.75em, 1.6vw, 1em);
  font-weight: 900;
  color: inherit;
  background: transparent;
  border: 2px solid currentColor;
  padding: 0.2em 0.55em;
  cursor: pointer;
  letter-spacing: 0.1em;
  align-self: flex-start;
  transition: background 0.15s, color 0.15s;
}
#info-btn:hover { background: currentColor; color: #000; }

/* === ARENA === */
#arena {
  flex: 1;
  position: relative;
  min-height: 0;
}

/* SVG connector overlay — behind panels */
#connector {
  position: absolute;
  inset: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  overflow: visible;
  z-index: 0;
}

/* === PANELS === */
.panel {
  position: absolute;
  background: #5bc8d2;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 0.2em;
  padding: 0.6em;
  z-index: 1;
  cursor: pointer;
  transition: background 0.3s;
}
.panel .pname {
  font-family: 'Arial Black', 'Arial', sans-serif;
  font-size: clamp(0.72em, 1.9vw, 1.25em);
  font-weight: 900;
  color: #000;
  text-align: center;
  letter-spacing: 0.1em;
  line-height: 1.15;
  word-break: break-word;
}
.panel .psummary {
  font-family: 'Courier New', monospace;
  font-size: clamp(0.48em, 1.1vw, 0.7em);
  font-weight: bold;
  color: #000;
  text-align: center;
  line-height: 1.3;
  word-break: break-all;
  display: none;
}

/* BALTHASAR·2 — top center, hexagon */
#balthasar {
  left: 30%; top: 2%;
  width: 40%; height: 44%;
  clip-path: polygon(20% 0%, 80% 0%, 100% 50%, 80% 100%, 20% 100%, 0% 50%);
}

/* CASPER·3 — bottom left, right-top slope */
#casper {
  left: 2%; bottom: 2%;
  width: 40%; height: 44%;
  clip-path: polygon(0% 0%, 85% 0%, 100% 100%, 0% 100%);
}

/* MELCHIOR·1 — bottom right, left-top slope */
#melchior {
  right: 2%; bottom: 2%;
  width: 40%; height: 44%;
  clip-path: polygon(15% 0%, 100% 0%, 100% 100%, 0% 100%);
}

/* Voting flash */
@keyframes flash-cyan-red {
  50% { background: #cc0000; }
}
body.voting .panel {
  animation: flash-cyan-red 0.4s infinite step-end;
}
body.voting #balthasar { animation-delay: 0.1s; }
body.voting #casper    { animation-delay: 0.2s; }
body.voting #melchior  { animation-delay: 0.3s; }

/* Voted panel colors */
.panel.resolve { background: #33cc33 !important; animation: none !important; }
.panel.reject  {
  background: #cc0000 !important;
  animation: reject-pulse 1s infinite ease !important;
}
@keyframes reject-pulse {
  70% { background: #aa0000 !important; }
}

/* After vote: show summary, shrink name */
body.voted .panel .psummary { display: block; }
body.voted .panel .pname {
  font-size: clamp(0.55em, 1.3vw, 0.85em);
}

/* Verdict badge */
#verdict {
  position: absolute;
  top: 0.3em; right: 0.3em;
  display: none;
  font-family: serif;
  font-size: clamp(0.9em, 2.2vw, 1.6em);
  font-weight: 900;
  padding: 0.12em 0.45em;
  border: 3px solid currentColor;
  z-index: 10;
  letter-spacing: 0.05em;
}
#verdict.resolve { display: block; color: #33cc33; }
#verdict.reject  { display: block; color: #cc0000; }

/* === BOTTOM INPUT === */
#bottom {
  flex-shrink: 0;
  padding: 0.4em 0.2em 0.1em;
  border-top: 1px solid currentColor;
  font-size: clamp(0.52em, 1.2vw, 0.75em);
}
.input-row {
  display: flex;
  align-items: center;
  gap: 0.6em;
  margin-bottom: 0.25em;
}
.input-row .lbl {
  white-space: nowrap;
  min-width: 8em;
  text-align: right;
  color: inherit;
}
.dots {
  flex: 1;
  border-bottom: 2px dotted currentColor;
  height: 1em;
}
#question-input {
  flex: 1;
  background: transparent;
  border: none;
  border-bottom: 1px solid currentColor;
  color: inherit;
  font-family: 'Courier New', monospace;
  font-size: inherit;
  outline: none;
  padding: 0 0.3em;
  letter-spacing: 0.05em;
}
#question-input::placeholder { opacity: 0.28; }
#question-input.error {
  border-bottom-color: #cc0000;
  animation: shake 0.3s ease;
}
@keyframes shake {
  25% { transform: translateX(-4px); }
  75% { transform: translateX( 4px); }
}

#activate-btn {
  display: block;
  margin: 0.45em auto 0;
  background: transparent;
  border: 2px solid currentColor;
  color: inherit;
  font-family: 'Courier New', monospace;
  font-size: clamp(0.65em, 1.5vw, 0.95em);
  font-weight: bold;
  letter-spacing: 0.28em;
  padding: 0.28em 2.8em;
  cursor: pointer;
  transition: background 0.15s, color 0.15s;
}
#activate-btn:hover { background: currentColor; color: #000; }
body.voting #activate-btn { opacity: 0.35; pointer-events: none; }
</style>
</head>
<body>
<div id="app">

  <!-- HEADER -->
  <header>
    <span class="h-title">提訴</span>
    <span class="h-title">決議</span>
  </header>

  <!-- INFO ROW -->
  <div id="top-row">
    <div id="info-block">
      <div class="row"><span class="lbl">CODE :</span><b id="el-code">---</b></div>
      <div class="row"><span class="lbl">FILE :</span><b id="el-file">MAGI_SYS</b></div>
      <div class="row"><span class="lbl">EXTENTION :</span><b>3023</b></div>
      <div class="row"><span class="lbl">EX_MODE :</span><b id="el-exmode">OFF</b></div>
      <div class="row"><span class="lbl">PRIORITY :</span><b id="el-priority">AAA</b></div>
    </div>
    <button id="info-btn">情報</button>
  </div>

  <!-- ARENA -->
  <div id="arena">

    <!-- Y-shape SVG connector (rendered behind panels) -->
    <svg id="connector">
      <line id="line-b" stroke="#ff6600" stroke-width="4" stroke-linecap="round"/>
      <line id="line-c" stroke="#ff6600" stroke-width="4" stroke-linecap="round"/>
      <line id="line-m" stroke="#ff6600" stroke-width="4" stroke-linecap="round"/>
      <text id="magi-label"
        font-family="'Arial Black',Arial,sans-serif"
        font-weight="900"
        font-size="14"
        fill="#ff6600"
        text-anchor="middle"
        letter-spacing="3">MAGI</text>
    </svg>

    <!-- Panels -->
    <div class="panel" id="balthasar" data-name="BALTHASAR·2">
      <span class="pname">BALTHASAR·2</span>
      <span class="psummary" id="balthasar-sum"></span>
    </div>

    <div class="panel" id="casper" data-name="CASPER·3">
      <span class="pname">CASPER·3</span>
      <span class="psummary" id="casper-sum"></span>
    </div>

    <div class="panel" id="melchior" data-name="MELCHIOR·1">
      <span class="pname">MELCHIOR·1</span>
      <span class="psummary" id="melchior-sum"></span>
    </div>

    <!-- Verdict badge -->
    <div id="verdict"></div>
  </div>

  <!-- BOTTOM INPUT -->
  <div id="bottom">
    <div class="input-row">
      <span class="lbl">access code :</span>
      <div class="dots"></div>
    </div>
    <div class="input-row">
      <span class="lbl">question :</span>
      <input type="text" id="question-input" placeholder="INPUT DECISION QUERY" autocomplete="off">
    </div>
    <button id="activate-btn">ACTIVATE</button>
  </div>

</div><!-- #app -->

<script>
(function () {
  'use strict';

  /* ── refs ── */
  const body     = document.body;
  const codeEl   = document.getElementById('el-code');
  const fileEl   = document.getElementById('el-file');
  const exEl     = document.getElementById('el-exmode');
  const priEl    = document.getElementById('el-priority');
  const qInput   = document.getElementById('question-input');
  const actBtn   = document.getElementById('activate-btn');
  const verdictEl= document.getElementById('verdict');
  const arena    = document.getElementById('arena');
  const svg      = document.getElementById('connector');

  const panels = {
    balthasar: document.getElementById('balthasar'),
    casper:    document.getElementById('casper'),
    melchior:  document.getElementById('melchior'),
  };
  const sums = {
    balthasar: document.getElementById('balthasar-sum'),
    casper:    document.getElementById('casper-sum'),
    melchior:  document.getElementById('melchior-sum'),
  };

  let voting = false, voted = false;

  /* ── code ticker ── */
  const randCode = () => { codeEl.textContent = String(100 + Math.floor(Math.random() * 600)); };
  randCode();
  setInterval(randCode, 3000);

  /* ── file rename ── */
  fileEl.addEventListener('click', e => {
    e.stopPropagation();
    const v = prompt('INPUT FILE', fileEl.textContent);
    if (v) fileEl.textContent = v;
  });

  /* ── ex mode ── */
  let exMode = false;
  exEl.addEventListener('click', e => {
    e.stopPropagation();
    exMode = !exMode;
    exEl.textContent = exMode ? 'ON' : 'OFF';
  });

  /* ── priority cycle ── */
  const pris = ['E', '+++', 'A', 'AA', 'AAA'];
  let priIdx = 4;
  priEl.addEventListener('click', e => {
    e.stopPropagation();
    priIdx = (priIdx + 1) % pris.length;
    priEl.textContent = pris[priIdx];
  });

  /* ── reset ── */
  const doReset = () => {
    voting = voted = false;
    body.className = '';
    verdictEl.className = '';
    verdictEl.textContent = '';
    Object.entries(panels).forEach(([k, p]) => {
      p.className = 'panel';
      p.querySelector('.pname').textContent = p.dataset.name;
    });
    Object.values(sums).forEach(s => { s.textContent = ''; });
    updateSVGColor('#ff6600');
  };

  /* ── extract summary (≤20 chars) ── */
  const excerpt = text => {
    if (!text) return '';
    const lines = (text + '').split('\n').map(l => l.trim()).filter(l => l && !/^[【={▸]/.test(l));
    return (lines[0] || '').replace(/^[-•·＊*]\s*/, '').slice(0, 20);
  };

  /* ── parse verdict ── */
  const parseVerdict = v => {
    const s = { balthasar: 'resolve', casper: 'resolve', melchior: 'resolve' };
    let final = 'resolve';
    if ((v || '').includes('二比一通过')) {
      s.casper = 'reject';
    } else if (/否决|搁置/.test(v || '')) {
      s.balthasar = s.casper = s.melchior = 'reject';
      final = 'reject';
    }
    return { s, final };
  };

  /* ── activate ── */
  const activate = async () => {
    if (voted)  { doReset(); return; }
    if (voting) return;

    const q = qInput.value.trim();
    if (!q) {
      qInput.classList.add('error');
      qInput.focus();
      setTimeout(() => qInput.classList.remove('error'), 500);
      return;
    }

    voting = true;
    body.className = 'voting';
    randCode();

    try {
      const res = await fetch('/api/analyze', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question: q }),
      });
      if (!res.ok) {
        const e = await res.json().catch(() => ({}));
        throw new Error(e.detail || 'HTTP ' + res.status);
      }
      const data = await res.json();
      const { s, final } = parseVerdict(data.verdict);

      /* panel summaries */
      sums.balthasar.textContent = excerpt(data.balthasar);
      sums.casper.textContent    = excerpt(data.casper);
      sums.melchior.textContent  = excerpt(data.melchior);

      /* panel colors */
      panels.balthasar.className = 'panel ' + s.balthasar;
      panels.casper.className    = 'panel ' + s.casper;
      panels.melchior.className  = 'panel ' + s.melchior;

      /* verdict badge */
      verdictEl.className   = final;
      verdictEl.textContent = final === 'resolve' ? '承認' : '否定';

      /* body state */
      body.className = 'voted ' + final;
      const svgColor = final === 'resolve' ? '#33cc33' : '#cc0000';
      updateSVGColor(svgColor);

      voting = false;
      voted  = true;

    } catch (err) {
      console.error('MAGI error:', err);
      doReset();
    }
  };

  /* ── events ── */
  actBtn.addEventListener('click', e => { e.stopPropagation(); activate(); });
  arena.addEventListener('click', () => { if (voted) doReset(); });
  document.getElementById('bottom').addEventListener('click', e => e.stopPropagation());
  document.getElementById('top-row').addEventListener('click', e => e.stopPropagation());
  document.querySelector('header').addEventListener('click', e => e.stopPropagation());

  qInput.addEventListener('click',   e => e.stopPropagation());
  qInput.addEventListener('keydown', e => { e.stopPropagation(); if (e.key === 'Enter') activate(); });

  document.getElementById('info-btn').addEventListener('click', e => { e.stopPropagation(); });

  window.addEventListener('keydown', e => {
    if (e.code === 'Space' && e.target === document.body) { e.preventDefault(); activate(); }
  });

  /* ── SVG Y-shape line updater ── */
  const updateSVGColor = color => {
    svg.querySelectorAll('line').forEach(l => l.setAttribute('stroke', color));
    svg.querySelector('text').setAttribute('fill', color);
  };

  const updateLines = () => {
    const ar = arena.getBoundingClientRect();
    if (!ar.width || !ar.height) return;

    const rect = el => el.getBoundingClientRect();
    const br = rect(panels.balthasar);
    const cr = rect(panels.casper);
    const mr = rect(panels.melchior);

    /* connection points on each panel */
    const bp = {
      x: (br.left + br.right) / 2 - ar.left,
      y: br.bottom - ar.top,
    };
    const cp = {
      x: cr.right - ar.left,
      y: (cr.top + cr.bottom) / 2 - ar.top,
    };
    const mp = {
      x: mr.left - ar.left,
      y: (mr.top + mr.bottom) / 2 - ar.top,
    };

    /* junction: in the gap between top and bottom panels */
    const gapMid = (br.bottom - ar.top + cr.top - ar.top) / 2;
    const jx = (bp.x + cp.x + mp.x) / 3;
    const jy = isFinite(gapMid) ? gapMid : (bp.y + cp.y + mp.y) / 3;

    const setLine = (id, p) => {
      const el = document.getElementById(id);
      el.setAttribute('x1', p.x.toFixed(1));
      el.setAttribute('y1', p.y.toFixed(1));
      el.setAttribute('x2', jx.toFixed(1));
      el.setAttribute('y2', jy.toFixed(1));
    };
    setLine('line-b', bp);
    setLine('line-c', cp);
    setLine('line-m', mp);

    const lbl = document.getElementById('magi-label');
    lbl.setAttribute('x', jx.toFixed(1));
    lbl.setAttribute('y', (jy - 6).toFixed(1));
    /* font-size in px proportional to arena height */
    lbl.setAttribute('font-size', Math.max(10, Math.round(ar.height * 0.028)));
  };

  window.addEventListener('resize', updateLines);
  /* two rAF passes: first allows layout, second measures */
  requestAnimationFrame(() => requestAnimationFrame(updateLines));
})();
</script>
</body>
</html>
