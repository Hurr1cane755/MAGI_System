<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MAGI System - Responsive Layout</title>
  <style>
    :root {
      --bg: #000000;
      --orange: #f39a2e;
      --green-line: #7cff9c;
      --blue-panel: #77b3d8;
      --blue-ui: #7fbfff;
      --yellow-panel: #efe08a;
      --yellow-ui: #efe08a;
      --green-panel: #8eff9f;
      --green-ui: #8eff9f;
      --red-panel: #d94a4a;
      --red-ui: #d94a4a;
      --panel-fill: var(--blue-panel);
      --ui-color: var(--blue-ui);
      --badge-size: 27px;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
      font-family: "Courier New", Courier, monospace;
    }
    body {
      display: grid;
      place-items: center;
      user-select: none;
    }

    .core {
      position: relative;
      width: min(96vw, calc(96vh * 1.9047619));
      aspect-ratio: 800 / 420;
      background: var(--bg);
      border: 2px solid var(--orange);
      overflow: hidden;
      container-type: size;
    }
    .scanlines {
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: .08;
      background: repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,.02) 0,
        rgba(255,255,255,.02) 1px,
        transparent 1px,
        transparent 4px
      );
      mix-blend-mode: screen;
    }

    /* ── タイトル帯 ── */
    .title-area {
      position: absolute;
      top: 1.9%;
      width: 31.875%;
      height: 22.38%;
      color: var(--orange);
      z-index: 3;
    }
    .title-left  { left: 1%; }
    .title-right { right: 1%; }
    .rail {
      position: absolute;
      left: 0;
      width: 100%;
      height: 10.64%;
    }
    .rail::before,
    .rail::after {
      content: "";
      position: absolute;
      left: 0; right: 0;
      height: 2px;
      background: var(--green-line);
      box-shadow: 0 0 4px rgba(124,255,156,.24);
    }
    .rail::before { top: 10%; }
    .rail::after  { top: 50%; }
    .rail.top    { top: 0; }
    .rail.bottom { bottom: 0; }
    .title {
      position: absolute;
      left: 0; right: 0;
      top: 15%;
      margin: 0;
      color: var(--orange);
      font-family: "Arial Black", "Microsoft YaHei", "PingFang SC", sans-serif;
      font-size: clamp(24px, 7.75cqw, 62px);
      line-height: 1;
      font-weight: 900;
      letter-spacing: .08em;
      transform: scaleX(1.02);
      text-align: center;
    }

    /* ── 左下情報ブロック ── */
    .meta {
      position: absolute;
      left: 2.25%;
      top: 25.95%;
      color: var(--orange);
      z-index: 3;
      line-height: 1.06;
      font-weight: 700;
    }
    .meta .main {
      font-size: clamp(12px, 3.05cqw, 24px);
      margin-bottom: .18em;
    }
    .meta .row {
      font-size: clamp(8px, 1.75cqw, 14px);
      white-space: nowrap;
    }

    /* ── 情報バッジ（質問スタイル） ── */
    .status-badge {
      position: absolute;
      left: 86.75%;
      top: 30.48%;
      width: 9.5%;
      height: 15.25%;
      border: 2px solid var(--orange);
      box-shadow: inset 0 0 0 1px rgba(0,0,0,.85);
      background: rgba(0,0,0,.45);
      color: var(--ui-color);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "Arial Black", "Microsoft YaHei", sans-serif;
      font-size: var(--badge-size);
      font-weight: 900;
      letter-spacing: .06em;
      cursor: pointer;
      z-index: 4;
      padding: 0;
      overflow: hidden;
    }
    /* 質問タイトル風の緑レール装飾 */
    .status-badge::before,
    .status-badge::after {
      content: "";
      position: absolute;
      left: 8%;
      right: 8%;
      height: 1.5px;
      background: var(--green-line);
      box-shadow: 0 0 3px rgba(124,255,156,.35);
    }
    .status-badge::before { top: 10%; }
    .status-badge::after  { bottom: 10%; }

    /* ── SVG レイアウト ── */
    .layout-svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
    }
    .panel {
      fill: var(--panel-fill);
      stroke: var(--orange);
      stroke-width: 2;
      transition: fill .22s ease, opacity .22s ease;
    }
    .bus {
      stroke: var(--orange);
      stroke-width: 6;
      fill: none;
      stroke-linecap: square;
    }
    .label {
      fill: #000;
      font-family: Arial, Helvetica, sans-serif;
      font-weight: 900;
      letter-spacing: 1px;
      text-anchor: middle;
      dominant-baseline: middle;
      pointer-events: none;
    }
    .bal-label { font-size: 28px; }
    .cas-label,
    .mel-label { font-size: 26px; }
    .magi-label {
      fill: var(--orange);
      font-family: Georgia, "Times New Roman", serif;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 1px;
      text-anchor: middle;
      dominant-baseline: middle;
      pointer-events: none;
    }
    /* 結果テキスト（面板内の小文字） */
    .result-text {
      fill: #000;
      font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
      font-size: 11px;
      font-weight: 700;
      text-anchor: middle;
      dominant-baseline: auto;
      pointer-events: none;
    }

    /* ── 入力モーダル ── */
    .input-modal {
      position: absolute;
      left: 50%;
      bottom: 3.8%;
      transform: translateX(-50%);
      width: min(78%, 560px);
      display: none;
      background: rgba(0,0,0,.96);
      border: 2px solid var(--orange);
      padding: 12px;
      z-index: 8;
    }
    .input-modal.active { display: block; }
    .input-title {
      color: var(--orange);
      font-size: clamp(10px, 1.8cqw, 14px);
      font-weight: 700;
      margin-bottom: 8px;
      letter-spacing: 1px;
    }
    .input-row {
      display: flex;
      gap: 8px;
    }
    .query-input {
      flex: 1;
      min-width: 0;
      background: transparent;
      border: 1px solid var(--orange);
      color: var(--blue-ui);
      padding: 8px 10px;
      font-size: clamp(12px, 2cqw, 16px);
      outline: none;
      font-family: inherit;
    }
    .query-input::placeholder {
      color: rgba(127,191,255,.6);
    }
    .query-btn {
      border: 1px solid var(--orange);
      background: var(--orange);
      color: #000;
      padding: 0 18px;
      font-size: clamp(11px, 1.75cqw, 14px);
      font-weight: 900;
      cursor: pointer;
      font-family: "Microsoft YaHei", sans-serif;
    }

    /* ── 審議中アニメーション ── */
    .processing .panel {
      animation: panelPulse .5s infinite steps(1);
    }
    @keyframes panelPulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: .78; }
    }
  </style>
</head>
<body>
  <div class="core" id="screen">
    <div class="scanlines"></div>

    <div class="title-area title-left">
      <div class="rail top"></div>
      <h1 class="title">提诉</h1>
      <div class="rail bottom"></div>
    </div>
    <div class="title-area title-right">
      <div class="rail top"></div>
      <h1 class="title">决议</h1>
      <div class="rail bottom"></div>
    </div>

    <div class="meta">
      <div class="main">CODE:<span id="code-num">473</span></div>
      <div class="row">FILE:MAGI_SYS</div>
      <div class="row">EXTENTION:3023</div>
      <div class="row">EX_MODE:OFF</div>
      <div class="row">PRIORITY:AAA</div>
    </div>

    <!-- 情報バッジ（質問スタイル、クリックで入力を開く） -->
    <button class="status-badge" id="statusBtn" type="button">情报</button>

    <svg class="layout-svg" viewBox="0 0 800 420"
         xmlns="http://www.w3.org/2000/svg" aria-hidden="true">

      <!-- 接続ライン -->
      <line class="bus" x1="300" y1="232" x2="286" y2="206" />
      <line class="bus" x1="500" y1="232" x2="514" y2="206" />
      <line class="bus" x1="400" y1="274" x2="400" y2="330" />
      <line class="bus" x1="331" y1="330" x2="469" y2="330" />

      <!-- 三面板 -->
      <polygon class="panel" points="265,3 537,3 537,182 456,247 344,247 265,182" />
      <polygon class="panel" points="12,198 219,198 331,280 331,406 12,406" />
      <polygon class="panel" points="788,198 581,198 469,280 469,406 788,406" />

      <!-- 面板ラベル -->
      <text class="label bal-label" x="401" y="129">BALTHASAR • 2</text>
      <text class="label cas-label" x="173" y="308">CASPER • 3</text>
      <text class="label mel-label" x="627" y="308">MELCHIOR • 1</text>
      <text class="magi-label"      x="400" y="291">MAGI</text>

      <!-- 結果テキスト（API応答後に表示） -->
      <text id="bal-result" class="result-text" x="401" y="162" visibility="hidden"></text>
      <text id="cas-result" class="result-text" x="172" y="335" visibility="hidden"></text>
      <text id="mel-result" class="result-text" x="628" y="335" visibility="hidden"></text>
    </svg>

    <div class="input-modal" id="inputModal">
      <div class="input-title">PLEASE ENTER YOUR QUESTION:</div>
      <div class="input-row">
        <input id="queryInput" class="query-input" type="text"
               placeholder="输入你想审议的问题..." autocomplete="off" />
        <button id="confirmBtn" class="query-btn" type="button">确认</button>
      </div>
    </div>
  </div>

  <script>
  (function () {
    'use strict';

    const screen    = document.getElementById('screen');
    const statusBtn = document.getElementById('statusBtn');
    const inputModal= document.getElementById('inputModal');
    const queryInput= document.getElementById('queryInput');
    const confirmBtn= document.getElementById('confirmBtn');
    const codeEl    = document.getElementById('code-num');
    const root      = document.documentElement;

    let timer = null;

    /* ── badge size ── */
    function updateBadgeSize(label) {
      root.style.setProperty('--badge-size', label === '审议中' ? '19px' : '27px');
    }

    function clearTimer() {
      if (timer) { clearTimeout(timer); timer = null; }
    }

    function setVisual(panelColor, uiColor, label) {
      root.style.setProperty('--panel-fill', panelColor);
      root.style.setProperty('--ui-color', uiColor);
      statusBtn.textContent = label;
      updateBadgeSize(label);
    }

    /* ── 結果テキストを消す ── */
    function clearResultText() {
      ['bal-result', 'cas-result', 'mel-result'].forEach(id => {
        const el = document.getElementById(id);
        if (!el) return;
        el.setAttribute('visibility', 'hidden');
        while (el.firstChild) el.removeChild(el.firstChild);
      });
    }

    function setDefaultState() {
      clearTimer();
      screen.classList.remove('processing');
      inputModal.classList.remove('active');
      setVisual('var(--blue-panel)', 'var(--blue-ui)', '情报');
      clearResultText();
    }

    function openInput() {
      clearTimer();
      screen.classList.remove('processing');
      setVisual('var(--blue-panel)', 'var(--blue-ui)', '情报');
      clearResultText();
      inputModal.classList.add('active');
      queryInput.value = '';
      queryInput.focus();
    }

    /* ── テキストを SVG <text> に複数行で書き込む ── */
    function writeSVGText(id, rawText, charsPerLine, maxLines) {
      const el = document.getElementById(id);
      if (!el) return;
      while (el.firstChild) el.removeChild(el.firstChild);
      if (!rawText) return;

      /* 空行・装飾行を除去して連結 */
      const clean = (rawText + '').split('\n')
        .map(l => l.trim())
        .filter(l => l && !/^[【={▸]/.test(l))
        .join(' ')
        .slice(0, charsPerLine * maxLines);

      /* charsPerLine 文字ごとに tspan */
      const ns = 'http://www.w3.org/2000/svg';
      for (let i = 0; i < maxLines; i++) {
        const chunk = clean.slice(i * charsPerLine, (i + 1) * charsPerLine);
        if (!chunk) break;
        const tspan = document.createElementNS(ns, 'tspan');
        tspan.setAttribute('x', el.getAttribute('x'));
        tspan.setAttribute('dy', i === 0 ? '0' : '14');
        tspan.textContent = chunk;
        el.appendChild(tspan);
      }
      el.setAttribute('visibility', 'visible');
    }

    /* ── 面板に結果を反映 ── */
    function updatePanelText(data) {
      writeSVGText('bal-result', data.balthasar, 24, 4);
      writeSVGText('cas-result', data.casper,    22, 4);
      writeSVGText('mel-result', data.melchior,  22, 4);
    }

    /* ── 裁決を解析 ── */
    function parseVerdict(data) {
      const v = (data.verdict || data.casper || '');
      if (/否决|否定|搁置/.test(v)) return 'reject';
      return 'resolve';
    }

    /* ── 審議開始（即 API コール） ── */
    function startDeliberation() {
      if (!queryInput.value.trim()) return;
      inputModal.classList.remove('active');
      screen.classList.add('processing');
      setVisual('var(--yellow-panel)', 'var(--yellow-ui)', '审议中');
      clearTimer();
      codeEl.textContent = String(100 + Math.floor(Math.random() * 900));
      makeDecision();
    }

    /* ── 本番 API コール ── */
    function makeDecision() {
      const question = queryInput.value.trim();

      fetch('/api/analyze', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question })
      })
      .then(r => {
        if (!r.ok) return r.json().then(e => { throw new Error(e.detail || 'HTTP ' + r.status); });
        return r.json();
      })
      .then(data => {
        screen.classList.remove('processing');

        const result = parseVerdict(data);
        if (result === 'reject') {
          setVisual('var(--red-panel)',   'var(--red-ui)',   '否定');
        } else {
          setVisual('var(--green-panel)', 'var(--green-ui)', '承認');
        }

        updatePanelText(data);

        clearTimer();
        timer = setTimeout(setDefaultState, 5000);
      })
      .catch(err => {
        console.error('MAGI API error:', err);
        screen.classList.remove('processing');
        setVisual('var(--red-panel)', 'var(--red-ui)', 'ERROR');
        clearTimer();
        timer = setTimeout(setDefaultState, 3000);
      });
    }

    /* ── イベント ── */
    statusBtn.addEventListener('click', openInput);
    confirmBtn.addEventListener('click', startDeliberation);
    queryInput.addEventListener('keydown', e => {
      if (e.key === 'Enter')  startDeliberation();
      if (e.key === 'Escape') inputModal.classList.remove('active');
    });

    setDefaultState();
  })();
  </script>
</body>
</html>
